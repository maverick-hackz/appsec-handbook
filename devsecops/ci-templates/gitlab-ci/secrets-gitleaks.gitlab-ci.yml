# secrets-gitleaks.gitlab-ci.yml -- Gitleaks secret scan stage.
# Include with:
#   include:
#     - local: devsecops/ci-templates/gitlab-ci/secrets-gitleaks.gitlab-ci.yml
# Required GitLab variables: none.
# Behaviour:
#   Runs on MR (diff scan via GitLab's pre-fetched history), on the
#   default branch, and on scheduled pipelines for a full sweep.
# <!-- TODO: verify the pinned gitleaks image tag against the latest GA -->

secrets:gitleaks:
  stage: test
  image:
    name: ghcr.io/gitleaks/gitleaks:v8.27.0
    entrypoint: [""]
  script:
    - gitleaks detect
        --source .
        --report-format sarif
        --report-path gitleaks.sarif
        --redact
        --exit-code 1
  artifacts:
    when: always
    paths:
      - gitleaks.sarif
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
