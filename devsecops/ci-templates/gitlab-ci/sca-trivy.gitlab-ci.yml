# sca-trivy.gitlab-ci.yml -- Trivy SCA + image scan stages for GitLab CI.
# Include with:
#   include:
#     - local: devsecops/ci-templates/gitlab-ci/sca-trivy.gitlab-ci.yml
# Required GitLab variables:
#   CI_REGISTRY_IMAGE         (auto by GitLab)
#   CI_COMMIT_SHA             (auto by GitLab)
# Behaviour:
#   sca:trivy_fs runs on MR + default branch; fails on HIGH or CRITICAL
#   in dependency manifests. sca:trivy_image runs on default branch only.

sca:trivy_fs:
  stage: test
  image:
    name: aquasec/trivy:0.36.0
    entrypoint: [""]
  script:
    - trivy fs
        --severity HIGH,CRITICAL
        --ignore-unfixed
        --exit-code 1
        --format sarif
        --output trivy-fs.sarif
        .
  artifacts:
    when: always
    reports:
      dependency_scanning: trivy-fs.sarif
    paths:
      - trivy-fs.sarif
    expire_in: 30 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

sca:trivy_image:
  stage: build_scan
  image:
    name: aquasec/trivy:0.36.0
    entrypoint: [""]
  script:
    - trivy image
        --severity CRITICAL,HIGH
        --ignore-unfixed
        --exit-code 1
        --format sarif
        --output trivy-image.sarif
        "${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHA}"
  artifacts:
    when: always
    reports:
      container_scanning: trivy-image.sarif
    paths:
      - trivy-image.sarif
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
