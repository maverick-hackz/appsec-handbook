# container-trivy-image.yml -- Trivy image scan after build.
# Runs on push to the protected branch and on manual dispatch.
# Permissions required:
#   contents: read
#   packages: read            (pull image from GHCR)
#   security-events: write    (SARIF upload)
# Secrets: GITHUB_TOKEN (provided automatically).
# Inputs: the workflow assumes the image is already built and pushed
#   to GHCR with the tag `ghcr.io/<owner>/<repo>:<sha>`. Adjust IMAGE
#   to match the registry and tagging policy.

name: Container Image Scan (Trivy)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write

env:
  IMAGE: ghcr.io/${{ github.repository }}:${{ github.sha }}

jobs:
  trivy-image:
    name: Trivy image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image
