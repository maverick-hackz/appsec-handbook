# secrets-gitleaks.yml -- Gitleaks: diff scan on PR, full history on schedule.
# Permissions required:
#   contents: read
#   security-events: write   (optional, if SARIF upload is enabled)
#   pull-requests: read
# Secrets:
#   GITLEAKS_LICENSE         (optional; enables Gitleaks Pro features)

name: Secret Scanning (Gitleaks)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * *'      # daily full-history sweep at 05:23 UTC

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # PR triggers: shallow is fine (diff scan only).
          # Schedule / push: fetch full history (configured below).
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
