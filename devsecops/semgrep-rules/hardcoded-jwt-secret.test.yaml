# Test cases for: hardcoded-jwt-secret
# Materialise these into language-specific fixtures next to the rule
# (hardcoded-jwt-secret.py, .js, .ts, .go, .java) to use `semgrep --test`.

cases:
  - language: python
    positive: |
      # ruleid: hardcoded-jwt-secret
      JWT_SECRET = "supersecret123"
    negative: |
      # ok: hardcoded-jwt-secret
      import os
      JWT_SECRET = os.environ["JWT_SECRET"]

  - language: javascript
    positive: |
      // ruleid: hardcoded-jwt-secret
      const jwtSecret = "supersecret123";
    negative: |
      // ok: hardcoded-jwt-secret
      const jwtSecret = process.env.JWT_SECRET;

  - language: typescript
    positive: |
      // ruleid: hardcoded-jwt-secret
      const JWT_KEY: string = "another-bad-one";
    negative: |
      // ok: hardcoded-jwt-secret
      const JWT_KEY: string = await vault.get("jwt_signing_key");

  - language: go
    positive: |
      // ruleid: hardcoded-jwt-secret
      var jwtSigningKey = "supersecret"
    negative: |
      // ok: hardcoded-jwt-secret
      var jwtSigningKey = os.Getenv("JWT_SIGNING_KEY")

  - language: java
    positive: |
      // ruleid: hardcoded-jwt-secret
      String jwtSecret = "supersecret";
    negative: |
      // ok: hardcoded-jwt-secret
      String jwtSecret = System.getenv("JWT_SECRET");
