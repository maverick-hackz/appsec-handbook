rules:
  - id: hardcoded-jwt-secret-assignment
    message: |
      Hardcoded JWT signing secret detected. Load the secret from an
      environment variable or a secrets manager; never store it in
      source.
    languages: [python, go, java]
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      category: security
      references:
        - https://cwe.mitre.org/data/definitions/798.html
        - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
          - pattern: $VAR := "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(jwt[_-]?secret|jwt[_-]?key|jwt[_-]?signing[_-]?key)'

  - id: hardcoded-jwt-secret-declaration
    message: |
      Hardcoded JWT signing secret detected. Load the secret from an
      environment variable or a secrets manager; never store it in
      source.
    languages: [javascript, typescript]
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
      category: security
      references:
        - https://cwe.mitre.org/data/definitions/798.html
        - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
    patterns:
      - pattern-either:
          - pattern: const $VAR = "..."
          - pattern: let $VAR = "..."
          - pattern: var $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: '(?i)(jwt[_-]?secret|jwt[_-]?key|jwt[_-]?signing[_-]?key)'
