# Test cases for: go-sql-string-concat

cases:
  - language: go
    positive: |
      // ruleid: go-sql-string-concat
      rows, err := db.Query("SELECT id FROM users WHERE name = '" + name + "'")
    negative: |
      // ok: go-sql-string-concat
      rows, err := db.Query("SELECT id FROM users WHERE name = ?", name)

  - language: go
    positive: |
      // ruleid: go-sql-string-concat
      rows, err := db.QueryContext(ctx, fmt.Sprintf("SELECT id FROM users WHERE id = %d", uid))
    negative: |
      // ok: go-sql-string-concat
      rows, err := db.QueryContext(ctx, "SELECT id FROM users WHERE id = $1", uid)

  - language: go
    positive: |
      // ruleid: go-sql-string-concat
      _, err := db.Exec("UPDATE users SET name = '" + name + "' WHERE id = " + fmt.Sprint(id))
    negative: |
      // ok: go-sql-string-concat
      _, err := db.Exec("UPDATE users SET name = ? WHERE id = ?", name, id)
