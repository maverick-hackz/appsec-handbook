site_name: AppSec Handbook
site_description: >-
  A working reference for application security and secure SDLC: secure coding,
  threat modeling, DevSecOps pipelines, framework mappings, architecture
  patterns, tooling evaluation methodology, and finding writeups.
site_url: https://maverick-hackz.github.io/appsec-handbook/
site_author: Savva Shevchuk

repo_url: https://github.com/maverick-hackz/appsec-handbook
repo_name: maverick-hackz/appsec-handbook
edit_uri: edit/main/

copyright: MIT License. See LICENSE in the repository root.

docs_dir: .
exclude_docs: |
  .git/
  .github/
  .ruff_cache/
  node_modules/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

plugins:
  # same-dir must be listed first: it lets `docs_dir: .` work, which mkdocs
  # 1.6+ otherwise rejects with "docs_dir should not be the parent directory
  # of the config file".
  - same-dir
  - search
  - awesome-pages
  - section-index
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
      fallback_to_build_date: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/maverick-hackz
      name: maverick-hackz on GitHub

# Strict mode is intentionally NOT enabled here. Many handbook pages use
# `[secure-coding/](secure-coding/)` style links that resolve correctly in
# both GitHub's renderer and mkdocs-material with section-index, but mkdocs
# strict still emits warnings for them. The build job in pages.yml runs with
# `mkdocs build` (warnings logged, not fatal). Promote to `--strict` once the
# warning count is zero across all sections.
